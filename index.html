<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vite-starter-template</title>
  </head>
  <body>
    <h1 class="text-3xl font-bold text-amber-300 underline">index</h1>

    <button
      id="dropdownDefaultButton"
      data-dropdown-toggle="dropdown"
      class="bg-brand hover:bg-brand-strong focus:ring-brand-medium rounded-base box-border inline-flex items-center justify-center border border-transparent px-4 py-2.5 text-sm leading-5 font-medium text-white shadow-xs focus:ring-4 focus:outline-none"
      type="button"
    >
      Dropdown button
      <svg class="ms-1.5 -me-0.5 h-4 w-4" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 9-7 7-7-7" />
      </svg>
    </button>

    <!-- Dropdown menu -->
    <div id="dropdown" class="bg-neutral-primary-medium border-default-medium rounded-base z-10 hidden w-44 border shadow-lg">
      <ul class="text-body p-2 text-sm font-medium" aria-labelledby="dropdownDefaultButton">
        <li>
          <a href="#" class="hover:bg-neutral-tertiary-medium hover:text-heading inline-flex w-full items-center rounded p-2">Dashboard</a>
        </li>
        <li>
          <a href="#" class="hover:bg-neutral-tertiary-medium hover:text-heading inline-flex w-full items-center rounded p-2">Settings</a>
        </li>
        <li>
          <a href="#" class="hover:bg-neutral-tertiary-medium hover:text-heading inline-flex w-full items-center rounded p-2">Earnings</a>
        </li>
        <li>
          <a href="#" class="hover:bg-neutral-tertiary-medium hover:text-heading inline-flex w-full items-center rounded p-2">Sign out</a>
        </li>
      </ul>
    </div>

    <form>
      <div class="mb-6 grid gap-6 md:grid-cols-2">
        <div>
          <label for="first_name" class="text-heading mb-2.5 block text-sm font-medium">First name</label>
          <input
            type="text"
            id="first_name"
            class="bg-neutral-secondary-medium border-default-medium text-heading rounded-base focus:ring-brand focus:border-brand placeholder:text-body block w-full border px-3 py-2.5 text-sm shadow-xs"
            placeholder="John"
            required
          />
        </div>
        <div>
          <label for="last_name" class="text-heading mb-2.5 block text-sm font-medium">Last name</label>
          <input
            type="text"
            id="last_name"
            class="bg-neutral-secondary-medium border-default-medium text-heading rounded-base focus:ring-brand focus:border-brand placeholder:text-body block w-full border px-3 py-2.5 text-sm shadow-xs"
            placeholder="Doe"
            required
          />
        </div>
        <div>
          <label for="company" class="text-heading mb-2.5 block text-sm font-medium">Company</label>
          <input
            type="text"
            id="company"
            class="bg-neutral-secondary-medium border-default-medium text-heading rounded-base focus:ring-brand focus:border-brand placeholder:text-body block w-full border px-3 py-2.5 text-sm shadow-xs"
            placeholder="Flowbite"
            required
          />
        </div>
        <div>
          <label for="phone" class="text-heading mb-2.5 block text-sm font-medium">Phone number</label>
          <input
            type="tel"
            id="phone"
            class="bg-neutral-secondary-medium border-default-medium text-heading rounded-base focus:ring-brand focus:border-brand placeholder:text-body block w-full border px-3 py-2.5 text-sm shadow-xs"
            placeholder="123-45-678"
            pattern="[0-9]{3}-[0-9]{2}-[0-9]{3}"
            required
          />
        </div>
        <div>
          <label for="website" class="text-heading mb-2.5 block text-sm font-medium">Website URL</label>
          <input
            type="url"
            id="website"
            class="bg-neutral-secondary-medium border-default-medium text-heading rounded-base focus:ring-brand focus:border-brand placeholder:text-body block w-full border px-3 py-2.5 text-sm shadow-xs"
            placeholder="flowbite.com"
            required
          />
        </div>
        <div>
          <label for="visitors" class="text-heading mb-2.5 block text-sm font-medium">Unique visitors (per month)</label>
          <input
            type="number"
            id="visitors"
            class="bg-neutral-secondary-medium border-default-medium text-heading rounded-base focus:ring-brand focus:border-brand placeholder:text-body block w-full border px-3 py-2.5 text-sm shadow-xs"
            placeholder=""
            required
          />
        </div>
      </div>
      <div class="mb-6">
        <label for="email" class="text-heading mb-2.5 block text-sm font-medium">Email address</label>
        <input
          type="email"
          id="email"
          class="bg-neutral-secondary-medium border-default-medium text-heading rounded-base focus:ring-brand focus:border-brand placeholder:text-body block w-full border px-3 py-2.5 text-sm shadow-xs"
          placeholder="john.doe@company.com"
          required
        />
      </div>
      <div class="mb-6">
        <label for="password" class="text-heading mb-2.5 block text-sm font-medium">Password</label>
        <input
          type="password"
          id="password"
          class="bg-neutral-secondary-medium border-default-medium text-heading rounded-base focus:ring-brand focus:border-brand placeholder:text-body block w-full border px-3 py-2.5 text-sm shadow-xs"
          placeholder="•••••••••"
          required
        />
      </div>
      <div class="mb-6">
        <label for="confirm_password" class="text-heading mb-2.5 block text-sm font-medium">Confirm password</label>
        <input
          type="password"
          id="confirm_password"
          class="bg-neutral-secondary-medium border-default-medium text-heading rounded-base focus:ring-brand focus:border-brand placeholder:text-body block w-full border px-3 py-2.5 text-sm shadow-xs"
          placeholder="•••••••••"
          required
        />
      </div>
      <div class="mb-6 flex items-start">
        <div class="flex h-5 items-center">
          <input
            id="remember"
            type="checkbox"
            value=""
            class="border-default-medium bg-neutral-secondary-medium focus:ring-brand-soft h-4 w-4 rounded-xs border focus:ring-2"
            required
          />
        </div>
        <label for="remember" class="text-heading ms-2 text-sm font-medium">I agree with the <a href="#" class="text-fg-brand hover:underline">terms and conditions</a>.</label>
      </div>
      <button
        type="submit"
        class="bg-brand hover:bg-brand-strong focus:ring-brand-medium rounded-base box-border border border-transparent px-4 py-2.5 text-sm leading-5 font-medium text-white shadow-xs focus:ring-4 focus:outline-none"
      >
        Submit
      </button>
    </form>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
